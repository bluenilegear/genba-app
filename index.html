<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>現場撮影</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Hiragino Sans',sans-serif;background:#f0ede8;}
.app{max-width:480px;margin:0 auto;padding:12px 12px 40px;}
.screen{display:none;}.screen.active{display:block;}
h1{font-size:18px;font-weight:500;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #ddd;color:#1a1a1a;}
.site-btn{width:100%;padding:14px 16px;background:#fff;border:1px solid #ddd;border-radius:12px;font-size:15px;font-weight:500;text-align:left;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:#1a1a1a;}
.site-btn:active{background:#f0ede8;}
.ptag{font-size:12px;color:#888;font-weight:400;}
.ptag.done{color:#27500A;font-weight:500;}
.back-btn{background:none;border:none;color:#666;font-size:14px;padding:6px 0;margin-bottom:10px;cursor:pointer;display:block;}
.pw{background:#e0ddd8;border-radius:8px;height:6px;margin-bottom:6px;overflow:hidden;}
.pb{background:#639922;height:100%;border-radius:8px;transition:width 0.3s;}
.pct{font-size:12px;color:#666;margin-bottom:14px;}
.sl{font-size:11px;font-weight:600;color:#999;letter-spacing:0.4px;margin:14px 0 8px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.pc{border:1px solid #ddd;border-radius:12px;background:#f8f8f5;overflow:hidden;}
.pc.done{background:#EAF3DE;border-color:#97C459;}
.pm{padding:14px 8px;cursor:pointer;text-align:center;}
.pm:active{opacity:0.7;}
.pid{font-size:15px;font-weight:500;color:#1a1a1a;}
.pc.done .pid{color:#27500A;}
.pdesc{font-size:11px;color:#999;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pc.done .pdesc{color:#3B6D11;}
.chk{display:none;}.pc.done .chk{display:inline;}
.pa{display:flex;border-top:1px solid #ddd;}
.panobtn{flex:1;padding:7px 4px;font-size:11px;font-weight:500;color:#185FA5;background:#fff;border:none;cursor:pointer;}
.panobtn:active{background:#f0f0f0;}
.pc.done .panobtn{background:#EAF3DE;}
.comp{background:#EAF3DE;border:1px solid #97C459;border-radius:12px;padding:14px;text-align:center;margin-bottom:14px;color:#27500A;font-weight:500;font-size:14px;}
.addbtn{width:100%;padding:12px;background:#fff;border:1px solid #ccc;border-radius:12px;font-size:14px;color:#666;cursor:pointer;margin-top:8px;}
.rstbtn{width:100%;padding:12px;background:#fff;color:#c0392b;border:1px solid #ffb3b3;border-radius:12px;font-size:14px;cursor:pointer;margin-top:8px;}
.notice{font-size:12px;color:#27500A;text-align:center;margin-top:10px;min-height:18px;font-weight:500;}
.hint{font-size:11px;color:#999;text-align:center;margin-top:4px;line-height:1.6;min-height:16px;}
.mbg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100;}
.md{background:#fff;border-radius:12px;padding:20px;width:90%;max-width:320px;}
.md h3{font-size:15px;font-weight:500;margin-bottom:12px;color:#1a1a1a;}
.md input{width:100%;margin-bottom:8px;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:14px;}
.mbt{display:flex;gap:8px;margin-top:12px;}
.mbt button{flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;}
input[type=file]{display:none;}
</style>
</head>
<body>
<div class="app">
<div class="screen active" id="s-home">
  <h1>現場撮影</h1>
  <div id="site-list"></div>
</div>
<div class="screen" id="s-shoot">
  <button class="back-btn" onclick="goHome()">← 現場一覧</button>
  <h1 id="stitle"></h1>
  <div class="pw"><div class="pb" id="pbar"></div></div>
  <div class="pct" id="ptxt"></div>
  <div id="comp" class="comp" style="display:none">全ての写真を撮影しました！</div>
  <div class="sl">全景写真</div>
  <div class="grid" id="g-zenkai"></div>
  <div class="sl">変状写真</div>
  <div class="grid" id="g-photos"></div>
  <button class="addbtn" onclick="showAdd()">＋ P番号を追加</button>
  <button class="rstbtn" onclick="resetSite()">リセット（撮り直し）</button>
  <div class="notice" id="notice"></div>
  <div class="hint" id="hint"></div>
</div>
<div id="m-add" style="display:none;">
  <div class="mbg" onclick="closeM('m-add')">
    <div class="md" onclick="event.stopPropagation()">
      <h3>P番号を追加</h3>
      <input type="text" id="m-pid" placeholder="例: P41"/>
      <input type="text" id="m-desc" placeholder="説明（例: 新たな崩壊箇所）"/>
      <div class="mbt">
        <button onclick="closeM('m-add')">キャンセル</button>
        <button onclick="doAdd()">追加</button>
      </div>
    </div>
  </div>
</div>
<input type="file" id="cam" accept="image/*" capture="environment" onchange="onPhoto(event)">
</div>
<script>
var SITES=[
{name:"特土002",photos:[
{id:"zen1",desc:"全景（左）"},{id:"zen2",desc:"全景（中）"},{id:"zen3",desc:"全景（右）"},
{id:"P1",desc:"敷砂の状況"},{id:"P2",desc:"吹付の状況"},{id:"P3",desc:"擁壁の状況"},{id:"P4",desc:"落石防護柵の状況"},{id:"P5",desc:"擁壁の錆汁"},{id:"P6",desc:"排水路吞口の状況"},{id:"P7",desc:"排水路の状況"},{id:"P8-1",desc:"排水路の落石"},{id:"P8-2",desc:"排水路の落石"},{id:"P9-1",desc:"排水路の状況"},{id:"P9-2",desc:"排水路の状況"},{id:"P10",desc:"排水路の状況"},{id:"P11",desc:"吹付の亀裂"},{id:"P12-1",desc:"吹付の亀裂"},{id:"P12-2",desc:"吹付の亀裂"},{id:"P13",desc:"のり肩の状況"},{id:"P14",desc:"落石防護網の状況"},{id:"P15",desc:"擁壁の状況"},{id:"P16",desc:"吹付の亀裂"},{id:"P17-1",desc:"吹付上の落石"},{id:"P17-2",desc:"吹付の落石"},{id:"P18",desc:"のり肩の状況"},{id:"P19-1",desc:"吹付の亀裂"},{id:"P19-2",desc:"吹付の亀裂"},{id:"P20-1",desc:"吹付の亀裂"},{id:"P20-2",desc:"吹付の亀裂"},{id:"P20-3",desc:"吹付の亀裂"},{id:"P21",desc:"吹付の状況"},{id:"P22-1",desc:"落石防護網の状況"}
]},
{name:"特土003",photos:[
{id:"zen1",desc:"全景（左）"},{id:"zen2",desc:"全景（中）"},{id:"zen3",desc:"全景（右）"},
{id:"P1",desc:"擁壁の状況"},{id:"P2-1",desc:"落石防護柵の状況"},{id:"P2-2",desc:"落石防護柵の状況"},{id:"P3-1",desc:"排水路の状況"},{id:"P3-2",desc:"排水路の状況"},{id:"P4",desc:"排水路の閉塞"},{id:"P5",desc:"排水路の閉塞"},{id:"P6-1",desc:"のり面の状況"},{id:"P6-2",desc:"のり面の状況"},{id:"P7",desc:"排水路の閉塞"},{id:"P8",desc:"のり面の状況"},{id:"P9-1",desc:"露岩の状況"},{id:"P9-2",desc:"露岩の状況"},{id:"P10",desc:"排水路の閉塞"},{id:"P11",desc:"のり面の状況"},{id:"P12-1",desc:"排水路の閉塞"},{id:"P12-2",desc:"排水路の閉塞"},{id:"P13",desc:"のり面の荒廃"},{id:"P14",desc:"排水路の閉塞"},{id:"P15",desc:"排水路の閉塞"},{id:"P16-1",desc:"のり面の状況"},{id:"P16-2",desc:"のり面の状況"},{id:"P17-1",desc:"小段Coの浮き"},{id:"P17-2",desc:"小段Coの浮き"},{id:"P18",desc:"のり面の状況"},{id:"P19",desc:"のり面の小崩壊"},{id:"P20",desc:"のり面の状況"},{id:"P21",desc:"排水路の閉塞"},{id:"P22",desc:"のり面の状況"},{id:"P23",desc:"のり肩の状況"}
]},
{name:"特土004",photos:[
{id:"zen1",desc:"全景（左）"},{id:"zen2",desc:"全景（中）"},{id:"zen3",desc:"全景（右）"},
{id:"P1",desc:"排水路の状況"},{id:"P2",desc:"のり面の状況"},{id:"P3",desc:"排水路の状況"},{id:"P4",desc:"のり面の状況"},{id:"P5",desc:"排水路の状況"},{id:"P6",desc:"排水路の閉塞"},{id:"P7",desc:"のり面の状況"},{id:"P8",desc:"排水路の閉塞"},{id:"P9",desc:"排水路の閉塞"},{id:"P10",desc:"のり面の状況"},{id:"P11",desc:"排水路の状況"},{id:"P12",desc:"のり面の状況"},{id:"P13",desc:"のり面の状況"},{id:"P14",desc:"のり面の状況"},{id:"P15",desc:"排水路の閉塞"},{id:"P16",desc:"のり面の状況"},{id:"P17",desc:"排水路の閉塞"},{id:"P18",desc:"のり面の荒廃"},{id:"P19-1",desc:"のり面の表層滑り"},{id:"P19-2",desc:"のり面の表層滑り"},{id:"P20",desc:"排水路の閉塞"},{id:"P21",desc:"小段Coの割れ"},{id:"P22",desc:"のり面の荒廃"},{id:"P23",desc:"排水路の閉塞"},{id:"P24",desc:"のり面の状況"},{id:"P25-1",desc:"のり面の状況"},{id:"P25-2",desc:"のり面の状況"},{id:"P26",desc:"のり肩の状況"},{id:"P27",desc:"フェンスの状況"}
]}
];

var sites=[], cur=null, pendId=null, pendMode=null;

function load(){
  try{var s=localStorage.getItem('genba_v6');if(s)sites=JSON.parse(s);else init();}catch(e){init();}
  SITES.forEach(function(ns){
    if(!sites.find(function(s){return s.name===ns.name;}))
      sites.push({name:ns.name,photos:ns.photos.map(function(p){return{id:p.id,desc:p.desc,taken:false,panoCount:0};})});
  });
  save();
}
function init(){
  sites=SITES.map(function(s){return{name:s.name,photos:s.photos.map(function(p){return{id:p.id,desc:p.desc,taken:false,panoCount:0};})};});
}
function save(){
  try{localStorage.setItem('genba_v6',JSON.stringify(sites.map(function(s){return{name:s.name,photos:s.photos.map(function(p){return{id:p.id,desc:p.desc,taken:p.taken,panoCount:p.panoCount||0};})};}))); }catch(e){}
}
function goHome(){
  document.getElementById('s-home').classList.add('active');
  document.getElementById('s-shoot').classList.remove('active');
  renderHome();
}
function renderHome(){
  var el=document.getElementById('site-list'); el.innerHTML='';
  sites.forEach(function(site,i){
    var tot=site.photos.length;
    var done=site.photos.filter(function(p){return p.taken;}).length;
    var isDone=done===tot;
    var btn=document.createElement('button'); btn.className='site-btn';
    btn.innerHTML='<span>'+site.name+'</span><span class="ptag '+(isDone?'done':'')+'">'+( isDone?'完了':done+' / '+tot+' 枚')+'</span>';
    btn.onclick=(function(idx){return function(){openSite(idx);};})(i);
    el.appendChild(btn);
  });
}
function openSite(i){
  cur=i;
  document.getElementById('stitle').textContent=sites[i].name;
  document.getElementById('s-home').classList.remove('active');
  document.getElementById('s-shoot').classList.add('active');
  renderShoot();
}
function renderShoot(){
  var site=sites[cur];
  var tot=site.photos.length;
  var done=site.photos.filter(function(p){return p.taken;}).length;
  document.getElementById('pbar').style.width=Math.round(done/tot*100)+'%';
  document.getElementById('ptxt').textContent=done+' / '+tot+' 枚撮影済み';
  document.getElementById('comp').style.display=done===tot?'block':'none';
  renderGrid('g-zenkai',site.photos.filter(function(p){return p.id.indexOf('zen')===0;}));
  renderGrid('g-photos',site.photos.filter(function(p){return p.id.indexOf('zen')!==0;}));
}
function renderGrid(gid,photos){
  var g=document.getElementById(gid); g.innerHTML='';
  photos.forEach(function(p){
    var card=document.createElement('div');
    card.className='pc'+(p.taken?' done':'');
    var ptxt=p.panoCount>0?' Pano×'+p.panoCount:'';
    var html='';
    html+='<div class="pm" onclick="shoot(\''+p.id+'\',\'normal\')"><div class="pid">'+p.id+' <span class="chk">✓</span></div><div class="pdesc">'+p.desc+ptxt+'</div></div>';
    html+='<div class="pa"><button class="panobtn" onclick="shoot(\''+p.id+'\',\'pano\')">Pano追加</button></div>';
    card.innerHTML=html;
    g.appendChild(card);
  });
}
function shoot(id,mode){
  pendId=id; pendMode=mode;
  var c=document.getElementById('cam'); c.value=''; c.click();
}
function onPhoto(e){
  var file=e.target.files[0]; if(!file||!pendId)return;
  var photo=sites[cur].photos.find(function(p){return p.id===pendId;}); if(!photo)return;
  var sn=sites[cur].name;
  var fn;
  if(pendMode==='pano'){
    photo.panoCount=(photo.panoCount||0)+1;
    photo.taken=true;
    fn=sn+'_'+pendId+'-pano'+photo.panoCount+'.jpg';
  }else{
    photo.taken=true;
    fn=sn+'_'+pendId+'.jpg';
  }
  save();
  renderShoot();
  var nt=document.getElementById('notice'), ht=document.getElementById('hint');
  var renamedFile=new File([file],fn,{type:'image/jpeg'});
  var url=URL.createObjectURL(renamedFile);
  var a=document.createElement('a'); a.href=url; a.download=fn;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},5000);
  nt.textContent=fn+' を保存しました';
  ht.textContent='ダウンロードフォルダに保存されます';
  setTimeout(function(){nt.textContent=''; ht.textContent='';},6000);
  pendId=null; pendMode=null;
}
function showAdd(){
  document.getElementById('m-pid').value='';
  document.getElementById('m-desc').value='';
  document.getElementById('m-add').style.display='block';
}
function closeM(id){document.getElementById(id).style.display='none';}
function doAdd(){
  var pid=document.getElementById('m-pid').value.trim().toUpperCase();
  var desc=document.getElementById('m-desc').value.trim();
  if(!pid){alert('P番号を入力してください。');return;}
  if(sites[cur].photos.find(function(p){return p.id===pid;})){alert('そのP番号は既に存在します。');return;}
  sites[cur].photos.push({id:pid,desc:desc||'追加箇所',taken:false,panoCount:0});
  save(); closeM('m-add'); renderShoot();
}
function resetSite(){
  if(!confirm('撮影記録をリセットしますか？'))return;
  sites[cur].photos.forEach(function(p){p.taken=false;p.panoCount=0;});
  save(); renderShoot();
}
load(); renderHome();
</script>
</body>
</html>
